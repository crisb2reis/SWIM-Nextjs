version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: swim_postgres
    environment:
      POSTGRES_USER: swim_user
      POSTGRES_PASSWORD: swim_password
      POSTGRES_DB: swim_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U swim_user -d swim_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: swim_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@swim.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

  grafana:
    image: grafana/grafana:11.4.0
    container_name: swim_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-swim_grafana_2025}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  grafana_data:
